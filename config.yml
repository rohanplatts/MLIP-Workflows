# ============================================================
# Structure configuration
#
# Add a new structure by inserting it under a group (pure/defects) and
# providing the fields used by the phonon workflow.
#
# structures:
#   <group_name>:           # pure or defects
#     <structure_name>:
#       unitcell_path: <relative path to POSCAR>
#       is_file_relaxed: <true|false>
#       primitive_cell_path: <relative path to primitive POSCAR> # recommended
#
#       supercell_matrix: [Nx, Ny, Nz]  # tuple/list; use the target supercell
#       delta: <float>                  # finite displacement in Angstrom
#       want_band_structure: <true|false>
#       kpts: [kx, ky, kz]  # k-point mesh for DOS sampling
#       npts: <int>         # number of DOS bins
#       width_ev: <float>   # Gaussian broadening in eV
# ============================================================
# NOTE THAT YOU CAN CHANGE THE DATA TYPE WHEN USING HPC. i use float32 bc my laptop small. 


# for defects, supply the supercell, for crystals, 

structures:
  pure:
    diamond:
      unitcell_path: diamond_super.poscar
      is_file_relaxed: true # if it is relaxed then kpoint path accuracy decreases, 
      # for which it is then recomended to definitely also submit the primitive cell
      primitive_cell_path: diamond_primitive.poscar
      
      supercell_matrix: (3,3,3) 
      delta: 0.01 # displacement size
      want_band_structure:  false 

      kpts: [12, 12, 12]
      npts: 400
      width_ev: 1e-3

    hbn:
      unitcell_path: hbn_super.poscar
      is_file_relaxed: false
      primitive_cell_path: hbn_primitive.poscar

      supercell_matrix: (2, 2, 1)
      delta: 0.01
      want_band_structure: true

      kpts: [12, 12, 12]
      npts: 400
      width_ev: 1e-3

  defects:
    diamond_nv:
      unitcell_path: diamond_nv.poscar
      is_file_relaxed: false
      primtive_cell_path: diamond_primitive.poscar

      supercell_matrix: [1, 1, 1]
      delta: 0.01
      
      npts: 400
      want_band_structure: True

      kpts: [12, 12, 12]
      width_ev: 1e-3

    hbn_c2:
      unitcell_path: hbn_c2.poscar
      is_file_relaxed: false
      primitive_cell_path: hbn_primitive.poscar

      supercell_matrix: [1, 1, 1]
      delta: 0.01
      want_band_structure: True

      kpts: [12, 12, 12]
      npts: 400
      width_ev: 1e-3

    cbvn:
      unitcell_path: relaxed_/CONTCAR_GS-edit.poscar
      is_file_relaxed: True
      primitive_cell_path: hbn_primitive.poscar
      

      supercell_matrix: [1, 1, 1]
      delta: 0.01
      want_band_structure: False  

      kpts: [9, 9, 9]
      npts: 300
      width_ev: 1e-3



  


  
